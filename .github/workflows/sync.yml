name: Weekly Sync

on:
  schedule:
    - cron: '0 12 * * 1'  # Every Monday 12 PM UTC
  workflow_dispatch:

concurrency:
  group: weekly-sync
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Pull latest skip list from data branch
        run: |
          git fetch origin data/sync-state 2>/dev/null || true
          if git show origin/data/sync-state:.sync-skip.conf > .sync-skip.conf 2>/dev/null; then
            echo "Skip list pulled from data/sync-state"
          else
            echo "No remote skip list, using local"
            [[ -f .sync-skip.conf ]] || cat > .sync-skip.conf << 'EOF'
          # .sync-skip.conf - Repos to skip during sync
          # Format: one line per repo (Owner/Repo)
          # Lines starting with # are comments
          EOF
          fi

      - name: Sync forks
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          bash repo-sync.sh --report-file .sync-report.md --auto-skip-gone \
                            --skip-file .sync-skip.conf

      - name: Write step summary
        if: always()
        run: |
          if [[ -f .sync-report.md ]]; then
            cat .sync-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## ⚠️ Sync failed before generating report"
              echo ""
              echo "Check the workflow logs for details."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Update tracking issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ ! -f .sync-report.md ]]; then
            cat > .sync-report.md << 'EOF'
          # 🔄 Fork sync report

          **Last run:** FAILED

          ## Summary

          ⚠️ **Sync failed before completing.** Check the workflow logs for details.
          EOF
          fi
          bash scripts/update-sync-issue.sh .sync-report.md "${{ github.repository }}"

      - name: Commit updated skip list to data branch
        run: |
          if [[ -n "$(git status --porcelain .sync-skip.conf 2>/dev/null)" ]]; then
            bash scripts/commit-to-data-branch.sh .sync-skip.conf -- \
              "Sync skip list with auto-detected upstream-gone repos"
          else
            echo "Skip list sin cambios, nada que commitear"
          fi
